<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal MUNDONET</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="logo">
            <h1>MUNDONET</h1>
            <span>Portal do Assinante</span>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha (últimos 4 dígitos do CPF)</label>
                <input type="password" id="senha" placeholder="••••" maxlength="4" required>
            </div>
            <button type="submit">Entrar</button>
            <p class="error" id="error">CPF ou senha inválidos</p>
        </form>
    </div>

    <script>
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '').substring(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const cpf = cpfInput.value.replace(/\D/g, '');
            const senha = document.getElementById('senha').value;

            if (cpf.length !== 11 || senha !== cpf.substring(7)) {
                document.getElementById('error').classList.add('show');
                return;
            }

            localStorage.setItem('cpf', cpf);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
