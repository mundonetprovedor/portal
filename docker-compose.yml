version: '3.8'

services:
  app:
    image: php:8.3-fpm-alpine
    container_name: portal-mundonet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - portal-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-portal_mundonet}
      - DB_USERNAME=${DB_USERNAME:-mundonet}
      - DB_PASSWORD=${DB_PASSWORD:-secret_password}

  nginx:
    image: nginx:alpine
    container_name: portal-mundonet-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - portal-network
    depends_on:
      - app

  db:
    image: mariadb:11
    container_name: portal-mundonet-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-portal_mundonet}
      MYSQL_USER: ${DB_USERNAME:-mundonet}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - portal-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  portal-network:
    driver: bridge

volumes:
  db-data:
    driver: local
